name: 🔥 MTProto Collector (Telethon Mode)

on:
  schedule:
    - cron: '*/15 * * * *'  # Каждые 15 минут по UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: proxy-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir requests telethon pysocks

      - name: 🔥 Run Telethon Collector
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
        run: |
          echo "🔥 Запуск в режиме Telethon (REAL MTProto check)"
          python main.py \
            --top 200 \
            --workers 150 \
            --timeout 3.0 \
            --output-dir verified

      - name: 💾 Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verified/ || true
          
          if ! git diff --staged --quiet; then
            STATS=$(git diff --staged --numstat | awk '{add+=$1; del+=$2} END {print "+"add" -"del}')
            TOTAL=$(git diff --staged --numstat | awk '{sum+=$1+$2} END {print sum+0}')
            
            if [ "$TOTAL" -gt 3 ]; then
              git commit -m "🔥 Proxies updated $STATS (Telethon) $(date '+%H:%M UTC')"
              git push
              echo "✅ Pushed: $STATS"
            else
              echo "⏭️ Minor changes, skipping push"
            fi
          else
            echo "✅ No changes"
          fi
        shell: bash
